# Enable mouse control
set -g mouse on

# Enable extended keys for better compatibility with modern terminals
set -g extended-keys on

# Increase scroll history
set-option -g history-limit 10000

# Use vim keybindings in scroll mode
set-window-option -g mode-keys vi

# Set vi-style copy and paste
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection

# ==========================
# TPM & Plugins Configuration
# ==========================

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-net-speed'
set -g @plugin 'tassaron/tmux-df'

# Configure the status bar right side to use the CPU, RAM, GPU, Net and Disk metrics
set -g status-right-length 150
set -g status-right "CPU: #{cpu_percentage} | RAM: #{ram_percentage} | GPU: #{gpu_percentage} | VRAM: #{gram_percentage} | Net: #{net_speed} | Disk: #{df_free} | %Y-%m-%d %H:%M "

# Refresh status bar every 5 seconds
set -g status-interval 5

# Automatic TPM installation (clones TPM and installs plugins if TPM is not found)
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'